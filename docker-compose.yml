services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_hamburgueseria
    ports:
      - "3306:3306"
    networks:
      - hamburgueseria-network
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./eurekaserver
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - hamburgueseria-network

  customer-service:
    build: ./customerservice/customerservice
    container_name: customer-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_hamburgueseria?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - hamburgueseria-network
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  menu-service:
    build: ./menuservice/menuservice
    container_name: menu-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_hamburgueseria?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - hamburgueseria-network
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  order-service:
    build: ./orderservice/orderservice
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_hamburgueseria?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - hamburgueseria-network
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  delivery-service:
    build: ./deliveryservice/deliveryservice
    container_name: delivery-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_hamburgueseria?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - hamburgueseria-network
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started

  api-gateway:
    build: ./deliveryservice/apigateway
    container_name: api-gateway
    ports:
      - "8090:8090"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - hamburgueseria-network
    depends_on:
      eureka-server:
        condition: service_started

volumes:
  mysql_data:

networks:
  hamburgueseria-network:
    driver: bridge