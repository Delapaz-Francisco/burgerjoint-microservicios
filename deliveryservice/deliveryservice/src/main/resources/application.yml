server:
  port: 8084

spring:
  application:
    name: delivery-service
  datasource:
    # 💡 Unificado a la base de datos principal de tu contenedor Docker
    url: jdbc:mysql://mysql-db:3306/db_hamburgueseria?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}


